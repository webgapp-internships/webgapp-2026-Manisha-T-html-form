<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-box">
    <h1>Student Registration Form</h1>
    <p>Fill all the details carefully</p>
    <form>
      <div>
        <label>Full Name *</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>
      <div>
        <label>Email Address *</label>
        <input type="email" placeholder="Enter your email address" required>
      </div>
      <div>
        <label>Mobile Number *</label>
        <input type="tel" placeholder="Enter your mobile number" required>
      </div>
      <div>
        <label>Date of Birth</label>
        <input type="date">
      </div>
      <div>
        <label>Gender</label>
        <div class="gender">
          <label><input type="radio" name="gender"> Male</label>
          <label><input type="radio" name="gender"> Female</label>
          <label><input type="radio" name="gender"> Other</label>
        </div>
      </div>
      <div>
        <label>College Name</label>
        <input type="text" placeholder="Enter your college name">
      </div>
      <div>
        <label>Department</label>
        <select>
          <option>Select Department</option>
          <option>CSE</option>
          <option>IT</option>
          <option>ECE</option>
          <option>EEE</option>
          <option>MECH</option>
          <option>CIVIL</option>
        </select>
      </div>
      <div>
        <label>Year of Study</label>
        <select>
          <option>Select Year</option>
          <option>1st Year</option>
          <option>2nd Year</option>
          <option>3rd Year</option>
          <option>Final Year</option>
        </select>
      </div>
      <div>
        <label>Technical Skills</label>
        <div class="skills">
          <label><input type="checkbox"> HTML</label>
          <label><input type="checkbox"> CSS</label>
          <label><input type="checkbox"> JavaScript</label>
          <label><input type="checkbox"> Java</label>
          <label><input type="checkbox"> Python</label>
          <label><input type="checkbox"> SQL</label>
        </div>
      </div>
      <div>
        <label>Address</label>
        <textarea placeholder="Enter your address"></textarea>
      </div>
      <div>
        <label>City</label>
        <input type="text" placeholder="Enter your city">
      </div>
      <div>
        <label>Pincode</label>
        <input type="number" placeholder="Enter your pincode">
      </div>
      <div>
        <label>Upload Resume</label>
        <input type="file">
      </div>
      <div>
        <label>LinkedIn Profile</label>
        <input type="url" placeholder="Enter LinkedIn profile link">
      </div>
      <div>
        <label>Why do you want to join?</label>
        <textarea placeholder="Write your answer here"></textarea>
      </div>
      <div>
        <label>
          <input type="checkbox" required>
          I confirm that all details are correct
        </label>
      </div>
      <div class="btn-group">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </div>
</body>
</html>
